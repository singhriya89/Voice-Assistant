<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced NLP Assistant - Riya & Akansha</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark #chat-box::-webkit-scrollbar-thumb { background-color: #475569; }
        
        .user-msg {
            background-color: #3b82f6; 
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-msg {
            background-color: #f3f4f6; 
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .dark .bot-msg {
            background-color: #334155;
            color: #f8fafc;
        }
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        /* Typing animation */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen flex flex-col items-center justify-center p-4 font-sans transition-colors duration-300">

    <!-- App Container -->
    <div id="app-container" class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[650px] max-h-full transition-colors duration-300 border border-gray-200 dark:border-gray-700">
        
        <!-- Header -->
        <div class="bg-blue-600 dark:bg-blue-800 text-white p-4 text-center shadow-md z-10 flex items-center justify-between transition-colors duration-300">
            <div class="text-left">
                <h1 class="text-xl font-bold tracking-wide">NLP Assistant</h1>
                <p class="text-xs text-blue-200">By Riya & Akansha</p>
            </div>
            <div class="flex items-center bg-blue-700 dark:bg-blue-900 px-3 py-1 rounded-full">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse mr-2"></span>
                <span class="text-xs font-medium">Python Server Connected</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col bg-slate-50 dark:bg-gray-900 transition-colors duration-300">
            <!-- Greeting -->
            <div class="msg-bubble bot-msg">
                Hello! I am your Python-powered NLP assistant.<br><br>
                Try asking me:<br>
                • "What is the time?"<br>
                • "Tell me about Python on wikipedia"<br>
                • "Search web for latest news"<br>
                • "Turn on dark mode"<br>
                • "Calculate 25 * 8"
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex items-center gap-2 transition-colors duration-300">
            
            <button id="mic-btn" class="p-3 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 transition flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </button>

            <input type="text" id="user-input" class="flex-1 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors duration-300" placeholder="Ask anything..." autocomplete="off">
            
            <button id="send-btn" class="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition shadow-md flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const synth = window.speechSynthesis;

        // --- FETCH FROM PYTHON FLASK BACKEND ---
        async function fetchPythonResponse(userText) {
            try {
                // Send the chat message securely to your local app.py
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json(); 
            } catch (error) {
                return { 
                    response: "<b>Connection Failed:</b> Could not reach the Python server. Make sure 'app.py' is running in your terminal.", 
                    command: null 
                };
            }
        }

        // --- UI FUNCTIONS ---
        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function speak(text) {
            if (synth && synth.speaking) synth.cancel();
            let cleanText = text.replace(/<[^>]*>?/gm, ''); 
            const utterThis = new SpeechSynthesisUtterance(cleanText);
            utterThis.rate = 1.0; 
            synth.speak(utterThis);
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'msg-bubble bot-msg flex items-center space-x-1';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // --- MAIN HANDLER ---
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            showTypingIndicator();

            // Fetch Response from Python
            let data = await fetchPythonResponse(text);
            removeTypingIndicator();

            // Handle UI Commands sent from Python
            if (data.command === 'DARK_MODE') {
                document.documentElement.classList.add('dark');
            } else if (data.command === 'LIGHT_MODE') {
                document.documentElement.classList.remove('dark');
            }

            addMessage('bot', data.response);
            speak(data.response);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        // --- VOICE RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN';

            recognition.onstart = function() {
                micBtn.classList.replace('bg-gray-100', 'bg-red-500');
                micBtn.classList.replace('text-gray-600', 'text-white');
                userInput.placeholder = "Listening...";
            };

            recognition.onresult = function(event) {
                userInput.value = event.results[0][0].transcript;
                handleSend(); 
            };

            recognition.onerror = function() {
                alert("Voice input failed. Please check microphone permissions.");
            };

            recognition.onend = function() {
                micBtn.classList.replace('bg-red-500', 'bg-gray-100');
                micBtn.classList.replace('text-white', 'text-gray-600');
                userInput.placeholder = "Ask anything...";
            };

            micBtn.addEventListener('click', () => { recognition.start(); });
        } else {
            micBtn.addEventListener('click', () => {
                alert("Voice recognition is not supported in this browser.");
            });
        }
    </script>
</body>
</html>
